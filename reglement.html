<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Reglement RP</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:black;
    font-family:Arial,sans-serif;
    color:white;
    overflow-x:hidden;
}

/* INTRO FLEUR */

#flower-intro{
    position:fixed;
    inset:0;
    background:black;
    z-index:99999;
    display:flex;
    justify-content:center;
    align-items:center;

    animation:introDisappear 0.3s ease forwards;
    animation-delay:2s;
}

.intro-flower{
    position:absolute;
    width:450px;
    height:450px;
    object-fit:contain;
    filter:drop-shadow(0 0 30px red);
}

.flower-left-intro{
    animation:splitLeft 2s ease forwards;
}

.flower-right-intro{
    animation:splitRight 2s ease forwards;
}

#page-content{
    opacity:0;
    animation:pageAppear 0.5s ease forwards;
    animation-delay:2.1s;
}

/* FLEURS COTES */

.side-flower{
    position:fixed;
    top:50%;
    width:250px;
    height:250px;
    object-fit:contain;
    filter:drop-shadow(0 0 25px red);
    opacity:0.85;
    z-index:1;
    pointer-events:none;
}

.left-side{
    left:20px;
    transform:translateY(-50%);
}

.right-side{
    right:20px;
    transform:translateY(-50%);
}

/* NAV */

nav{
    background:#111;
    padding:20px;
    border-bottom:2px solid red;
    text-align:center;
    position:relative;
    z-index:10;
}

nav a{
    color:red;
    margin:0 25px;
    text-decoration:none;
    font-size:20px;
    font-weight:bold;
    text-shadow:0 0 10px red;
}

nav a:hover{
    color:white;
}

/* REGLEMENT */

.box{
    max-width:900px;
    margin:60px auto;
    background:rgba(17,17,17,0.94);
    padding:30px;
    border:2px solid red;
    border-radius:15px;
    box-shadow:0 0 20px red;
    position:relative;
    z-index:5;
}

h1{
    color:red;
    text-align:center;
    font-size:50px;
    text-shadow:0 0 15px red;
}

h2{
    color:red;
    margin-top:30px;
}

p, li{
    font-size:18px;
    line-height:1.6;
}

ul{
    margin-left:25px;
}

.intro{
    text-align:center;
    color:#ddd;
    margin-bottom:25px;
}

hr{
    border:1px solid red;
    margin:25px 0;
}

strong{
    color:red;
}

/* ANIMATIONS */

@keyframes splitLeft{
    0%{
        opacity:0;
        transform:scale(0.5);
    }

    20%{
        opacity:1;
        transform:scale(1.2);
    }

    60%{
        opacity:1;
        transform:scale(1);
    }

    100%{
        opacity:0.9;
        transform:translateX(-43vw) scale(0.7) rotate(-360deg);
    }
}

@keyframes splitRight{
    0%{
        opacity:0;
        transform:scale(0.5);
    }

    20%{
        opacity:1;
        transform:scale(1.2);
    }

    60%{
        opacity:1;
        transform:scale(1);
    }

    100%{
        opacity:0.9;
        transform:translateX(43vw) scale(0.7) rotate(360deg);
    }
}

@keyframes introDisappear{
    to{
        opacity:0;
        visibility:hidden;
    }
}

@keyframes pageAppear{
    to{
        opacity:1;
    }
}

@media(max-width:900px){
    .intro-flower{
        width:280px;
        height:280px;
    }

    .side-flower{
        width:120px;
        height:120px;
        opacity:0.25;
    }

    .box{
        margin:40px 15px;
    }

    nav a{
        display:inline-block;
        margin:10px;
    }
}
</style>
</head>

<body>
